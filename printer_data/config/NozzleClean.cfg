#####################################################################
#   Nozzle Cleaner
#####################################################################    
[gcode_macro CLEAN_NOZZLE]
variable_start_x: 248
variable_start_y: 40
variable_start_z: 1.6
variable_wipe_dist_x: -2
variable_wipe_qty: 5
variable_wipe_spd: 50
variable_raise_distance: 30

gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

  G90                                            ; absolute positioning
  ## Move nozzle to start position
  G1 Z{start_z} F1500
  G1 Y{start_y} X{start_x} F6000

  ## Wipe nozzle
  {% for wipes in range(1, (wipe_qty + 1)) %}
    ; WIPE LEFT
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    ; WIPE RIGHT
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
  {% endfor %}

  ## Raise nozzle after complete
  G1 Z{raise_distance}
  G1 Y20

[gcode_macro CLEAN_PURGE_NOZZLE]
variable_start_x: 248
variable_start_y: 40
variable_start_z: 1.6
variable_wipe_dist_x: -2
variable_wipe_qty: 5
variable_wipe_spd: 50
variable_raise_distance: 30
variable_purge_loc_x: 248
variable_purge_loc_y: 20

gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

  G90                                            ; absolute positioning
  ## Move nozzle to start position
  G1 Z{start_z} F1500
  G1 Y{start_y} X{start_x} F6000

  ## Wipe nozzle
  {% for wipes in range(1, (wipe_qty + 1)) %}
    ; WIPE LEFT
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y + 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    ; WIPE RIGHT
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x - wipe_dist_x} F{wipe_spd * 300}
    G1 Y{start_y - 15} X{start_x + wipe_dist_x} F{wipe_spd * 300}
  {% endfor %}

  ## Raise nozzle after complete
  G1 Z{raise_distance}
  G1 Y{purge_loc_y}
  G1 X{purge_loc_x}
  G92 E0
  G1 E25.0 F100
  G92 E0
  G1 E0 F300
  G1 Z{start_z}
  G1 Y{start_y}
  G1 X 250 F1000

 ; Priming line 100 mm
  G1 X230 Y1 Z0.28 F1000
  G1 X130 Y1 E30 F1000
  G92 E0
  
  ; Retrakce 1 mm proti vytékání
  G1 E-0.2 F1800
  G92 E0
